<script>
/* --------------------------
  Firebase config (use provided)
---------------------------*/
const firebaseConfig = {
apiKey: "AIzaSyA9U2Qo-LJVvJGaeV6xaptjyEuw-q-ddZY",
authDomain: "v-earn-cd4ab.firebaseapp.com",
databaseURL: "https://v-earn-cd4ab-default-rtdb.firebaseio.com",
projectId: "v-earn-cd4ab",
storageBucket: "v-earn-cd4ab.firebasestorage.app",
messagingSenderId: "417055322305",
appId: "1:417055322305:web:64ab53f453ff8672876440",
measurementId: "G-J0X0GF22R0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const panelRef = db.ref('panel');

/* --------------------------
  Helpers: period & timer
  period format: YYYYMMDDHHMM  (local time)
---------------------------*/
function getCurrentPeriod(){
  const now = new Date();
  // You can set timezone offset here if needed
  const Y = now.getFullYear().toString();
  const M = String(now.getMonth()+1).padStart(2,'0');
  const D = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  return Y + M + D + h + m;
}
function secondsUntilNextMinute(){
  const now = new Date();
  return 60 - now.getSeconds();
}

/* --------------------------
  State
---------------------------*/
let panelUid = localStorage.getItem('panel_uid') || null; // panel uid (users node key)
let gameApp = null, gameName = null;
let deposit = 0, currency = 'INR';
let usingCustomQr = false;
let panelQrUrl = null;
let predictionInterval = null;
let countdownInterval = null;

/* --------------------------
  UI elements
---------------------------*/
const setupForm = document.getElementById('setupForm');
const createBtn = document.getElementById('createBtn');

const mainPanel = document.getElementById('mainPanel');
const uidDisplay = document.getElementById('uidDisplay');
const gameNameEl = document.getElementById('gameName');
const amountEl = document.getElementById('amount');
const currencyLabel = document.getElementById('currencyLabel');

const showQrBtn = document.getElementById('useAdminQrBtn');
const pasteQrBtn = document.getElementById('pasteQrBtn');
const customQrInput = document.getElementById('customQrInput');
const qrPreview = document.getElementById('qrPreview');
const payDoneBtn = document.getElementById('payDoneBtn');
const utrSection = document.getElementById('utrSection');
const utrInput = document.getElementById('utrInput');
const submitUtrBtn = document.getElementById('submitUtrBtn');

const statusBox = document.getElementById('statusBox');
const blockedBanner = document.getElementById('blockedBanner');

const predictSection = document.getElementById('predictSection');
const periodEl = document.getElementById('period');
const countdownEl = document.getElementById('countdown');
const bigSmallEl = document.getElementById('bigSmall');
const numberEl = document.getElementById('number');
const colorCircle = document.getElementById('colorCircle');
const colorNameEl = document.getElementById('colorName');
const confText = document.getElementById('confText');
const winBanner = document.getElementById('winBanner');

const uidPopup = document.getElementById('uidPopup');

/* --------------------------
  Panel QR realtime listen
---------------------------*/
panelRef.child('qrCodeUrl').on('value', snap => {
  panelQrUrl = snap.val();
  // if user is using admin QR show preview
  if(!usingCustomQr && panelQrUrl){
    qrPreview.src = panelQrUrl;
    qrPreview.style.display = 'block';
    document.getElementById('payDoneBtn').style.display = 'block';
  }
});

/* --------------------------
  Create session / user
---------------------------*/
createBtn.addEventListener('click', async ()=>{
  const appSel = document.getElementById('appSelect').value;
  const gameSel = document.getElementById('gameSelect').value;
  const gameId = document.getElementById('gameIdInput').value.trim();
  const dep = parseFloat(document.getElementById('depositInput').value);
  const curr = document.getElementById('currencySelect').value;

  if(!gameId){ alert('Enter your in-game ID'); return; }
  if(isNaN(dep) || dep < 500){ alert('Deposit must be at least 500'); return; }

  // create user node (key will be our panel UID) using push
  const newRef = db.ref('users').push();
  panelUid = newRef.key;
  const userObj = {
    gameApp: appSel,
    gameName: gameSel,
    gameId: gameId,
    amount: dep,
    currency: curr,
    status: 'pending',
    blocked: false,
    createdAt: Date.now()
  };
  await newRef.set(userObj);
  localStorage.setItem('panel_uid', panelUid);

  // show main panel
  uidDisplay.innerText = panelUid;
  gameNameEl.innerText = gameSel;
  amountEl.innerText = dep;
  currencyLabel.innerText = curr;
  setupForm.style.display = 'none';
  mainPanel.style.display = 'block';

  // UID connected popup with animation & sound
  showUidConnected();
  listenUser(); // start listening user changes
});

/* --------------------------
  Show UID popup + play simple beep
---------------------------*/
function showUidConnected(){
  uidPopup.style.display = 'block';
  uidPopup.style.opacity = '1';
  // simple CSS fade out after 2.2s
  setTimeout(()=>{ uidPopup.style.transition='opacity 0.6s'; uidPopup.style.opacity='0'; }, 2200);
  setTimeout(()=>{ uidPopup.style.display='none'; uidPopup.style.transition=''; }, 2800);
  // play short beep using WebAudio
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = 880;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
    setTimeout(()=>{ o.stop(); ctx.close(); }, 300);
  }catch(e){ /* ignore audio errors */ }
}

/* --------------------------
  Listen user node realtime
---------------------------*/
function listenUser(){
  if(!panelUid) return;
  const uRef = db.ref('users/' + panelUid);
  uRef.on('value', snap => {
    const u = snap.val() || {};
    amountEl.innerText = u.amount || 0;
    gameNameEl.innerText = u.gameName || '-';

    // status UI
    statusBox.className = 'status';
    if(u.status === 'success' || u.status === 'approved'){
      statusBox.classList.add('success'); statusBox.innerText = 'PAYMENT SUCCESSFUL!';
      // enable prediction only if not blocked
      if(!u.blocked) startPrediction();
      document.getElementById('payDoneBtn').style.display = 'none';
    } else if(u.status === 'rejected'){
      statusBox.classList.add('pending'); statusBox.innerText = 'PAYMENT REJECTED';
      stopPrediction();
    } else {
      statusBox.classList.add('pending'); statusBox.innerText = 'PAYMENT NOT RECEIVED';
      stopPrediction();
      // show pay button
      document.getElementById('payDoneBtn').style.display = panelQrUrl || qrPreview.src ? 'block' : 'none';
    }

    if(u.blocked){
      blockedBanner.style.display = 'block';
      stopPrediction();
      document.getElementById('payDoneBtn').disabled = true;
    } else {
      blockedBanner.style.display = 'none';
      document.getElementById('payDoneBtn').disabled = false;
    }
  });
}

/* --------------------------
  QR usage 
---------------------------*/
showQrBtn.addEventListener('click', ()=>{
  usingCustomQr = false;
  customQrInput.style.display = 'none';
  if(panelQrUrl){
    qrPreview.src = panelQrUrl; qrPreview.style.display = 'block';
    document.getElementById('payDoneBtn').style.display = 'block';
  } else {
    alert('Admin has not set a panel QR yet.');
  }
});
pasteQrBtn.addEventListener('click', ()=>{
  usingCustomQr = true;
  customQrInput.style.display = 'block';
  customQrInput.focus();
  document.getElementById('payDoneBtn').style.display = 'block';
});
customQrInput.addEventListener('change', ()=>{
  const v = customQrInput.value.trim();
  if(v){ qrPreview.src = v; qrPreview.style.display='block'; }
});

/* QR popup big on click */
qrPreview.addEventListener('click', ()=> {
  document.getElementById('qrImg').src = qrPreview.src;
  document.getElementById('qrPop').classList.add('show');
});
function closeQr(){ document.getElementById('qrPop').classList.remove('show'); }

/* --------------------------
  Payment -> UTR submit flow
---------------------------*/
payDoneBtn.addEventListener('click', ()=>{
  // show UTR section
  utrSection.style.display = 'block';
  document.getElementById('utrInput').focus();
});

submitUtrBtn.addEventListener('click', async ()=>{
  const utr = utrInput.value.trim();
  if(!utr) return alert('Please enter UTR / Transaction ID');
  if(!panelUid) return alert('Internal error: no UID');

  // push utr request
  const r = await db.ref('users/' + panelUid + '/utrRequests').push({
    utr: utr,
    amount: parseFloat(document.getElementById('depositInput').value) || 0,
    currency: document.getElementById('currencySelect').value,
    time: Date.now(),
    status: 'pending'
  });

  // set flag so admin can see pending
  await db.ref('users/' + panelUid).update({pendingUtr: true});

  alert('UTR submitted — Admin will verify. Thank you!');
  utrInput.value = '';
  utrSection.style.display = 'none';
});

/* --------------------------
  Prediction: stable per period + saved in DB
  - If lastPrediction.period === currentPeriod => reuse
  - Else generate, save to users/{uid}/lastPrediction
---------------------------*/
async function startPrediction(){
  if(!panelUid) return;
  if(predictionInterval) return;
  predictSection.classList.add('show');
  // immediate generate/show
  await ensurePredictionForCurrentPeriod();
  // set interval to re-check each minute boundary
  predictionInterval = setInterval(ensurePredictionForCurrentPeriod, 1000 * 10); // check every 10s near minute boundary
  startCountdownTimer();
}
function stopPrediction(){
  if(predictionInterval){ clearInterval(predictionInterval); predictionInterval = null; }
  if(countdownInterval){ clearInterval(countdownInterval); countdownInterval = null; }
  predictSection.classList.remove('show');
  winBanner.style.display = 'none';
}

/* Ensure prediction exists and show it */
async function ensurePredictionForCurrentPeriod(){
  if(!panelUid) return;
  const period = getCurrentPeriod();
  periodEl.innerText = period;
  // load lastPrediction
  const lpSnap = await db.ref('users/' + panelUid + '/lastPrediction').once('value');
  const lp = lpSnap.val();
  if(lp && lp.period === period){
    // reuse
    showPrediction(lp);
    return;
  }
  // otherwise generate a fresh prediction for this period and save it
  const newPred = await generateAndSavePrediction(period);
  showPrediction(newPred);
}

/* Generate prediction algorithm (biased high win) */
async function generateAndSavePrediction(period){
  // Try to read some recent 'chart' history if exists to get slope
  const chartSnap = await db.ref('users/' + panelUid + '/chart').limitToLast(20).once('value');
  let points = [];
  chartSnap.forEach(s => { const v = s.val(); if(v && typeof v.v !== 'undefined') points.push(Number(v.v)); });
  if(points.length === 0){
    // fallback to global chartHistory if available
    const gSnap = await db.ref('chartHistory').limitToLast(20).once('value');
    gSnap.forEach(s => { const v = s.val(); if(v && typeof v.v !== 'undefined') points.push(Number(v.v)); });
  }
  // fill synthetic if empty
  if(points.length === 0){
    for(let i=0;i<20;i++) points.push(Math.sin(i/3) + Math.random()*0.4);
  }

  const last = points[points.length-1];
  const prev = points[points.length-2] || last;
  const slope = last - prev;
  const vol = Math.max(...points) - Math.min(...points);

  // increase winning chances ~73%
  const winProbability = 0.73;
  const isWin = Math.random() < winProbability;

  // decide big/small biased by slope when isWin true
  const bigSmall = isWin ? (slope >= 0 ? 'BIG' : 'SMALL') : (Math.random() < 0.5 ? 'BIG' : 'SMALL');

  // number bias: BIG -> 5-9, SMALL -> 0-4, but pick weighted to favor "winning" numbers
  const number = bigSmall === 'BIG' ? (5 + Math.floor(Math.random()*5)) : (Math.floor(Math.random()*5));

  // color bias: favor GREEN slightly
  const r = Math.random();
  let colorName = 'GREEN', colorClass = 'green';
  if(r < 0.5){ colorName='GREEN'; colorClass='green'; }
  else if(r < 0.85){ colorName='RED'; colorClass='red'; }
  else { colorName='VIOLET'; colorClass='violet'; }

  const confidence = Math.min(99, Math.round(Math.abs(slope)*40 + (1 - Math.min(1,vol))*40 + Math.random()*20));

  const pred = { ts: Date.now(), period, bigSmall, number, colorName, confidence, isWin };
  // Save to user node
  await db.ref('users/' + panelUid + '/lastPrediction').set(pred);
  // Also save to global for admin review
  await db.ref('predictions/' + period + '/' + panelUid).set(pred);
  return pred;
}

/* Show prediction on UI */
function showPrediction(pred){
  bigSmallEl.innerText = pred.bigSmall || '--';
  numberEl.innerText = (typeof pred.number !== 'undefined') ? pred.number : '-';
  const cls = (pred.colorName || 'GREEN').toLowerCase();
  colorCircle.className = 'color-circle ' + (cls === 'green' ? 'green' : (cls === 'red' ? 'red' : 'violet'));
  colorNameEl.innerText = pred.colorName || 'GREEN';
  confText.innerText = 'Confidence: ' + (pred.confidence || 0) + '%';
  winBanner.style.display = pred.isWin ? 'block' : 'none';
}

/* Countdown timer until next minute — updates every second */
function startCountdownTimer(){
  if(countdownInterval) clearInterval(countdownInterval);
  function update(){
    const s = secondsUntilNextMinute();
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s % 60).padStart(2,'0');
    countdownEl.innerText = 'Next in ' + '00:' + String(ss).padStart(2,'0');
    // If we're at boundary (s close to 60 or 0), ensure prediction ensured
    // handled by ensurePredictionForCurrentPeriod running in interval
  }
  update();
  countdownInterval = setInterval(update, 1000);
}

/* --------------------------
  Keep result stable across refresh
  - ensured because we store lastPrediction.period and reuse it
---------------------------*/

/* --------------------------

---------------------------*/
window.addEventListener('load', ()=>{

    // show main panel
    setupForm.style.display = 'none';
    mainPanel.style.display = 'block';
    uidDisplay.innerText = panelUid;
    // fetch minimal user info to populate
    db.ref('users/' + panelUid).once('value').then(snap=>{
      const u = snap.val() || {};
      gameNameEl.innerText = u.gameName || '-';
      amountEl.innerText = u.amount || 0;
      currencyLabel.innerText = u.currency || 'INR';
      listenUser();
    });
  }
});

/* Cleanup on unload */
window.addEventListener('beforeunload', ()=>{ stopPrediction(); });
</script>
</body>
</html>
